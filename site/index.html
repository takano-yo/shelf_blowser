<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shelf_blowser — 本棚ブラウジングの入口</title>
  <meta name="description" content="キーワードまたは NDC 分類（日本十進分類法）から入る、書誌データの本棚ブラウジング">
  <link rel="stylesheet" href="css/styles.css?v=20260724a">
</head>
<body class="start-page">
  <main class="start">
    <!-- 検索エリアの上に置くキャッチコピー（中央寄せ・モダンなゴシック） -->
    <p class="start__copy">今日はどこから見ようか？</p>

    <!-- 検索窓: 収録データ検索（コーパス・サーバ不要・既定）と CiNii API 検索
         （稼働時のみ）を切り替える。収録データ検索では類（0〜9）を選んで
         shelf.html?ndc=<類>&q=<語> へ、API 検索では shelf.html?q=<語>&mode=api へ
         遷移する（検索の実行は本棚ページ側。スタートページは /api/ping のみ叩く）。
         JS 無効時は素の GET フォームとして q だけを送る（後方互換）。 -->
    <section class="start__section start__section--search" aria-label="キーワード検索">
      <div class="start__search-modes" id="start-search-modes">
        <label class="start__search-field">
          <span class="start__search-label">検索</span>
          <select class="start__search-select" id="start-search-mode" aria-label="検索モード">
            <option value="data">収録データ検索</option>
            <option value="api">CiNii API 検索</option>
          </select>
        </label>
        <label class="start__search-field" id="start-class-field">
          <span class="start__search-label">類</span>
          <select class="start__search-select" id="start-search-class" aria-label="検索する NDC 類"></select>
        </label>
      </div>
      <form class="search start__search" action="shelf.html" method="get" role="search" aria-label="書誌検索" id="start-search-form">
        <!-- 入力欄と検索ボタンは本棚ページと同じ .search__field でまとめ、隙間なく接続し
             高さを揃える（.search 直下だと gap と align-items:center でボタンが離れ・縮む）。 -->
        <div class="search__field">
          <input
            class="search__input"
            id="start-search-input"
            type="search"
            name="q"
            placeholder="キーワードから探す（例: 漱石 小説）"
            aria-label="検索キーワード"
            autocomplete="off">
          <button class="search__button" type="submit" aria-label="検索">検索</button>
        </div>
      </form>
      <p class="start__note" id="start-search-note">
        収録データ（<a href="https://ci.nii.ac.jp/books/" target="_blank" rel="noopener">CiNii Books</a> のスナップショット）から NDC 類（1桁）内を検索します。サーバー稼働時は CiNii API 検索も選べます。
      </p>
    </section>

    <!-- NDC 分類ナビ: 類目（1桁）→ 綱目（2桁）→ 細目（3桁）を各階層 10 個の
         ボタン（横5×縦2）で掘り下げる。内容は js/start.js が描画し、
         階層移動時はボタン群が横にスライドして切り替わる。 -->
    <section class="start__section start__section--ndc" aria-label="NDC 分類ナビゲーション">
      <nav class="ndc-nav" id="ndc-nav">
        <h2 class="ndc-nav__heading">分類から探す</h2>
        <!-- パンくず（選択中の分類）と「棚を見る」ボタンを常設し、1桁目選択前から
             領域を確保して選択時のボタン上下移動をなくす。パンくずのクリックで
             その階層（選択前）へ戻る。 -->
        <div class="ndc-nav__controls" id="ndc-controls">
          <nav class="ndc-nav__crumbs" id="ndc-crumbs" aria-label="選択中の分類"></nav>
          <a class="ndc-nav__view" id="ndc-view" href="shelf.html"></a>
        </div>
        <div class="ndc-nav__viewport" id="ndc-viewport">
          <p class="ndc-nav__loading" id="ndc-loading">分類データを読み込み中…</p>
        </div>
        <!-- 出典（分類名の提供元・ライセンス・リンクの明記）を分類エリア内に集約 -->
        <p class="ndc-nav__source">
          出典 : <a href="https://www.jla.or.jp/committees/bunrui/ndc-data/" target="_blank" rel="noopener">日本図書館協会 NDC-LD</a> NDC9版（CC BY ライセンス）
        </p>
      </nav>
    </section>
  </main>

  <script src="js/start.js?v=20260722a" defer></script>
</body>
</html>
