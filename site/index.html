<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shelf_blowser — 日本近代文学の本棚</title>
  <meta name="description" content="CiNii Books の書誌データを本棚のように並べてブラウジングする学術検索支援アプリ（試作版：日本近代文学）">
  <link rel="stylesheet" href="css/styles.css?v=20260628b">
</head>
<body>
  <!-- ページ最上部のヘッダ（タイトル/説明）。スクロールには追随せず流れて消える。 -->
  <header class="site-header">
    <div class="site-header__bar">
      <div class="site-header__brand">
        <h1 class="site-header__title">shelf_blowser</h1>
        <p class="site-header__subtitle">日本近代文学の本棚</p>
      </div>
    </div>
    <p class="site-header__note" id="shelf-stats" aria-live="polite"></p>
  </header>

  <!-- 検索バーのみスクロールに追随して最上部に残る -->
  <div class="searchbar">
    <div class="searchbar__inner">
      <!-- 検索窓（現フェーズはダミー） -->
      <form class="search" id="search-form" role="search" aria-label="書誌検索（準備中）">
        <input
          class="search__input"
          id="search-input"
          type="search"
          placeholder="タイトル・著者・出版社で検索（準備中）"
          aria-label="検索キーワード"
          autocomplete="off">
        <button class="search__button" type="submit" aria-label="検索">検索</button>
      </form>
    </div>
  </div>

  <main class="shelf-wrap">
    <div class="shelf" id="shelf" aria-busy="true">
      <p class="shelf__loading" id="shelf-loading">本棚を読み込み中…</p>
    </div>
  </main>

  <!-- 詳細オーバーレイ（画面右） -->
  <div class="overlay" id="overlay" hidden>
    <div class="overlay__backdrop" data-close></div>
    <aside class="overlay__panel" role="dialog" aria-modal="true" aria-labelledby="ov-title" tabindex="-1">
      <button class="overlay__close" type="button" data-close aria-label="閉じる">×</button>
      <div class="overlay__body" id="overlay-body"></div>
    </aside>
  </div>

  <footer class="site-footer">
    <p>データ出典: <a href="https://support.nii.ac.jp/ja/cib/api/b_opensearch" target="_blank" rel="noopener">CiNii Books OpenSearch API</a>／表紙画像: <a href="https://openbd.jp/" target="_blank" rel="noopener">openBD</a></p>
  </footer>

  <script src="js/app.js?v=20260628b" defer></script>
</body>
</html>
